jobs:
  stage_0_job_0:
    name: image-view camera-calibration intra-process-demo image-tools
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    needs: []
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Build ros-kilted-image-view ros-kilted-camera-calibration ros-kilted-intra-process-demo
        ros-kilted-image-tools
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        CURRENT_RECIPES: ros-kilted-image-view ros-kilted-camera-calibration ros-kilted-intra-process-demo
          ros-kilted-image-tools
        BUILD_TARGET: ''
      run: |
        export CI=azure
        export GIT_BRANCH=$BUILD_SOURCEBRANCHNAME
        export FEEDSTOCK_NAME=$(basename ${BUILD_REPOSITORY_NAME})
        .scripts/build_unix.sh --target $BUILD_TARGET
name: build_unix
on:
  push:
    branches:
    - buildbranch_linux
