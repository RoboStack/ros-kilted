jobs:
  stage_0_job_0:
    name: eigenpy jrl-cmakemodules hpp-fcl pinocchio
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    needs: []
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Build ros-kilted-eigenpy ros-kilted-jrl-cmakemodules ros-kilted-hpp-fcl
        ros-kilted-pinocchio
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        CURRENT_RECIPES: ros-kilted-eigenpy ros-kilted-jrl-cmakemodules ros-kilted-hpp-fcl
          ros-kilted-pinocchio
        BUILD_TARGET: ''
      run: |
        export CI=azure
        export GIT_BRANCH=$BUILD_SOURCEBRANCHNAME
        export FEEDSTOCK_NAME=$(basename ${BUILD_REPOSITORY_NAME})
        .scripts/build_unix.sh --target $BUILD_TARGET
name: build_linux64
on:
  push:
    branches:
    - buildbranch_linux
