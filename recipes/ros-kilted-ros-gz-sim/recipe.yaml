# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-ros-gz-sim
  version: 2.1.10
source:
  git: https://github.com/ros2-gbp/ros_ign-release.git
  tag: release/kilted/ros_gz_sim/2.1.10-1
  target_directory: ros-kilted-ros-gz-sim/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 12
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - gflags
    - numpy
    - pip
    - pkg-config
    - python
    - ros-kilted-ament-cmake
    - ros-kilted-ament-cmake-python
    - ros-kilted-ament-index-python
    - ros-kilted-ament-lint-auto
    - ros-kilted-ament-lint-common
    - ros-kilted-builtin-interfaces
    - ros-kilted-geometry-msgs
    - ros-kilted-gz-math-vendor
    - ros-kilted-gz-msgs-vendor
    - ros-kilted-gz-sensors-vendor
    - ros-kilted-gz-sim-vendor
    - ros-kilted-gz-transport-vendor
    - ros-kilted-launch
    - ros-kilted-launch-ros
    - ros-kilted-launch-testing
    - ros-kilted-launch-testing-ament-cmake
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-components
    - ros-kilted-rcpputils
    - ros-kilted-ros-environment
    - ros-kilted-ros-gz-interfaces
    - ros-kilted-ros-workspace
    - ros-kilted-std-msgs
    - ros-kilted-tf2
    - ros-kilted-tf2-ros
    - ros2-distro-mutex 0.11.* kilted_*
    - if: linux
      then:
        - libgl-devel
        - libopengl-devel
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
  run:
    - gflags
    - python
    - ros-kilted-ament-index-python
    - ros-kilted-builtin-interfaces
    - ros-kilted-geometry-msgs
    - ros-kilted-gz-math-vendor
    - ros-kilted-gz-msgs-vendor
    - ros-kilted-gz-sim-vendor
    - ros-kilted-gz-transport-vendor
    - ros-kilted-launch
    - ros-kilted-launch-ros
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-components
    - ros-kilted-rcpputils
    - ros-kilted-ros-gz-interfaces
    - ros-kilted-ros-workspace
    - ros-kilted-std-msgs
    - ros-kilted-tf2
    - ros-kilted-tf2-ros
    - ros2-distro-mutex 0.11.* kilted_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
