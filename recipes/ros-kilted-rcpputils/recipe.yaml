# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-rcpputils
  version: 2.13.4
source:
  git: https://github.com/ros2-gbp/rcpputils-release.git
  tag: release/kilted/rcpputils/2.13.4-2
  target_directory: ros-kilted-rcpputils/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 10
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - numpy
    - pip
    - python
    - ros-kilted-ament-cmake
    - ros-kilted-ament-cmake-copyright
    - ros-kilted-ament-cmake-cppcheck
    - ros-kilted-ament-cmake-cpplint
    - ros-kilted-ament-cmake-flake8
    - ros-kilted-ament-cmake-gen-version-h
    - ros-kilted-ament-cmake-gtest
    - ros-kilted-ament-cmake-lint-cmake
    - ros-kilted-ament-cmake-pep257
    - ros-kilted-ament-cmake-ros-core
    - ros-kilted-ament-cmake-uncrustify
    - ros-kilted-ament-cmake-xmllint
    - ros-kilted-rcutils
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros2-distro-mutex 0.10.* kilted_*
  run:
    - python
    - ros-kilted-rcutils
    - ros-kilted-ros-workspace
    - ros2-distro-mutex 0.10.* kilted_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
