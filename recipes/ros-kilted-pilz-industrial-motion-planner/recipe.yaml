# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-pilz-industrial-motion-planner
  version: 2.14.1
source:
  git: https://github.com/ros2-gbp/moveit2-release.git
  tag: release/kilted/pilz_industrial_motion_planner/2.14.1-1
  target_directory: ros-kilted-pilz-industrial-motion-planner/src/work
  patches:
    - patch/ros-kilted-pilz-industrial-motion-planner.patch

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 15
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: http://moveit.ros.org
  repository: https://github.com/moveit/moveit2
  license: BSD-3-Clause
  summary: MoveIt plugin to generate industrial trajectories PTP, LIN, CIRC and sequences thereof.
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - libboost-devel
    - libboost-python-devel
    - numpy
    - pip
    - python
    - ros-kilted-ament-cmake
    - ros-kilted-ament-cmake-gmock
    - ros-kilted-ament-cmake-gtest
    - ros-kilted-eigen3-cmake-module
    - ros-kilted-generate-parameter-library
    - ros-kilted-geometry-msgs
    - ros-kilted-launch-param-builder
    - ros-kilted-moveit-common
    - ros-kilted-moveit-configs-utils
    - ros-kilted-moveit-core
    - ros-kilted-moveit-msgs
    - ros-kilted-moveit-resources-panda-moveit-config
    - ros-kilted-moveit-resources-prbt-moveit-config
    - ros-kilted-moveit-resources-prbt-pg70-support
    - ros-kilted-moveit-resources-prbt-support
    - ros-kilted-moveit-ros-move-group
    - ros-kilted-moveit-ros-planning
    - ros-kilted-orocos-kdl-vendor
    - ros-kilted-pilz-industrial-motion-planner-testutils
    - ros-kilted-pluginlib
    - ros-kilted-rclcpp
    - ros-kilted-ros-environment
    - ros-kilted-ros-testing
    - ros-kilted-ros-workspace
    - ros-kilted-tf2
    - ros-kilted-tf2-eigen
    - ros-kilted-tf2-eigen-kdl
    - ros-kilted-tf2-geometry-msgs
    - ros-kilted-tf2-kdl
    - ros-kilted-tf2-ros
    - ros2-distro-mutex 0.13.* kilted_*
  run:
    - python
    - ros-kilted-eigen3-cmake-module
    - ros-kilted-generate-parameter-library
    - ros-kilted-geometry-msgs
    - ros-kilted-moveit-common
    - ros-kilted-moveit-core
    - ros-kilted-moveit-msgs
    - ros-kilted-moveit-ros-move-group
    - ros-kilted-moveit-ros-planning
    - ros-kilted-orocos-kdl-vendor
    - ros-kilted-pluginlib
    - ros-kilted-rclcpp
    - ros-kilted-ros-workspace
    - ros-kilted-tf2
    - ros-kilted-tf2-eigen
    - ros-kilted-tf2-eigen-kdl
    - ros-kilted-tf2-geometry-msgs
    - ros-kilted-tf2-kdl
    - ros-kilted-tf2-ros
    - ros2-distro-mutex 0.13.* kilted_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
