# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-autoware-ndt-scan-matcher
  version: 1.4.0
source:
  git: https://github.com/ros2-gbp/autoware_core-release.git
  tag: release/humble/autoware_ndt_scan_matcher/1.4.0-1
  target_directory: ros-kilted-autoware-ndt-scan-matcher/src/work
  patches:
    - patch/ros-kilted-autoware-ndt-scan-matcher.patch

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 12
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - fmt
    - libboost-devel
    - numpy
    - pcl
    - pip
    - python
    - ros-kilted-ament-cmake-auto
    - ros-kilted-ament-cmake-cppcheck
    - ros-kilted-ament-lint-auto
    - ros-kilted-autoware-cmake
    - ros-kilted-autoware-internal-debug-msgs
    - ros-kilted-autoware-internal-localization-msgs
    - ros-kilted-autoware-localization-util
    - ros-kilted-autoware-map-msgs
    - ros-kilted-autoware-utils-diagnostics
    - ros-kilted-autoware-utils-logging
    - ros-kilted-autoware-utils-pcl
    - ros-kilted-autoware-utils-visualization
    - ros-kilted-diagnostic-msgs
    - ros-kilted-geometry-msgs
    - ros-kilted-nav-msgs
    - ros-kilted-pcl-conversions
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-components
    - ros-kilted-ros-environment
    - ros-kilted-ros-testing
    - ros-kilted-ros-workspace
    - ros-kilted-sensor-msgs
    - ros-kilted-std-srvs
    - ros-kilted-tf2
    - ros-kilted-tf2-eigen
    - ros-kilted-tf2-geometry-msgs
    - ros-kilted-tf2-ros
    - ros-kilted-tf2-sensor-msgs
    - ros-kilted-visualization-msgs
    - ros2-distro-mutex 0.11.* kilted_*
    - vtk-base
    - if: linux
      then:
        - libgl-devel
        - libopengl-devel
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
  run:
    - fmt
    - pcl
    - python
    - ros-kilted-autoware-internal-debug-msgs
    - ros-kilted-autoware-internal-localization-msgs
    - ros-kilted-autoware-localization-util
    - ros-kilted-autoware-map-msgs
    - ros-kilted-autoware-utils-diagnostics
    - ros-kilted-autoware-utils-logging
    - ros-kilted-autoware-utils-pcl
    - ros-kilted-autoware-utils-visualization
    - ros-kilted-diagnostic-msgs
    - ros-kilted-geometry-msgs
    - ros-kilted-nav-msgs
    - ros-kilted-pcl-conversions
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-components
    - ros-kilted-ros-workspace
    - ros-kilted-sensor-msgs
    - ros-kilted-std-srvs
    - ros-kilted-tf2
    - ros-kilted-tf2-eigen
    - ros-kilted-tf2-geometry-msgs
    - ros-kilted-tf2-ros
    - ros-kilted-tf2-sensor-msgs
    - ros-kilted-visualization-msgs
    - ros2-distro-mutex 0.11.* kilted_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
