# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-urdfdom
  version: 4.0.1

build:
  number: 12
  script: ''
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build: []
  host:
    - console_bridge
    - python
    - ros-kilted-console-bridge-vendor
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros-kilted-tinyxml2-vendor
    - ros-kilted-urdfdom-headers
    - ros2-distro-mutex 0.11.* kilted_*
    - tinyxml2
  run:
    - console_bridge
    - python
    - ros-kilted-console-bridge-vendor
    - ros-kilted-ros-workspace
    - ros-kilted-tinyxml2-vendor
    - ros-kilted-urdfdom-headers
    - ros2-distro-mutex 0.11.* kilted_*
    - tinyxml2
    - urdfdom >=4.0.1, <4.1.0a0
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
