# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-turtlebot3-node
  version: 2.3.6
source:
  git: https://github.com/ros2-gbp/turtlebot3-release.git
  tag: release/kilted/turtlebot3_node/2.3.6-1
  target_directory: ros-kilted-turtlebot3-node/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 15
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: http://turtlebot3.robotis.com
  repository: https://github.com/ROBOTIS-GIT/turtlebot3
  license: Apache-2.0
  summary: TurtleBot3 driver node that include diff drive controller, odometry and tf node
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - numpy
    - pip
    - python
    - ros-kilted-ament-cmake
    - ros-kilted-dynamixel-sdk
    - ros-kilted-geometry-msgs
    - ros-kilted-message-filters
    - ros-kilted-nav-msgs
    - ros-kilted-rclcpp
    - ros-kilted-rcutils
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros-kilted-sensor-msgs
    - ros-kilted-std-msgs
    - ros-kilted-std-srvs
    - ros-kilted-tf2
    - ros-kilted-tf2-ros
    - ros-kilted-turtlebot3-msgs
    - ros2-distro-mutex 0.13.* kilted_*
  run:
    - python
    - ros-kilted-dynamixel-sdk
    - ros-kilted-geometry-msgs
    - ros-kilted-message-filters
    - ros-kilted-nav-msgs
    - ros-kilted-rclcpp
    - ros-kilted-rcutils
    - ros-kilted-ros-workspace
    - ros-kilted-sensor-msgs
    - ros-kilted-std-msgs
    - ros-kilted-std-srvs
    - ros-kilted-tf2
    - ros-kilted-tf2-ros
    - ros-kilted-turtlebot3-msgs
    - ros2-distro-mutex 0.13.* kilted_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
