# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-slam-toolbox
  version: 2.9.0
source:
  git: https://github.com/SteveMacenski/slam_toolbox-release.git
  tag: release/kilted/slam_toolbox/2.9.0-2
  target_directory: ros-kilted-slam-toolbox/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 10
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
    - ${{ 'qt-main' if (build_platform != target_platform) }}
    - if: target_platform == 'emscripten-wasm32'
      then:
        - ros-kilted-rosidl-default-generators
    - if: build_platform != target_platform
      then:
        - qt-main
  host:
    - blas-devel
    - if: build_platform == target_platform
      then:
        - pkg-config
    - ceres-solver
    - eigen
    - libboost-devel
    - libboost-python-devel
    - liblapack
    - numpy
    - pip
    - python
    - qt-main
    - ros-kilted-ament-cmake
    - ros-kilted-ament-cmake-cpplint
    - ros-kilted-ament-cmake-flake8
    - ros-kilted-ament-cmake-gtest
    - ros-kilted-ament-cmake-uncrustify
    - ros-kilted-ament-lint-auto
    - ros-kilted-bond
    - ros-kilted-bondcpp
    - ros-kilted-builtin-interfaces
    - ros-kilted-interactive-markers
    - ros-kilted-launch
    - ros-kilted-launch-testing
    - ros-kilted-lifecycle-msgs
    - ros-kilted-message-filters
    - ros-kilted-nav-msgs
    - ros-kilted-pluginlib
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-lifecycle
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros-kilted-rosidl-default-generators
    - ros-kilted-rviz-common
    - ros-kilted-rviz-default-plugins
    - ros-kilted-rviz-ogre-vendor
    - ros-kilted-rviz-rendering
    - ros-kilted-sensor-msgs
    - ros-kilted-std-msgs
    - ros-kilted-std-srvs
    - ros-kilted-tf2
    - ros-kilted-tf2-geometry-msgs
    - ros-kilted-tf2-ros
    - ros-kilted-tf2-sensor-msgs
    - ros-kilted-visualization-msgs
    - ros2-distro-mutex 0.10.* kilted_*
    - suitesparse
    - tbb
    - tbb-devel
    - if: linux
      then:
        - libgl-devel
        - libopengl-devel
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
  run:
    - ceres-solver
    - eigen
    - libboost-devel
    - libboost-python-devel
    - liblapack
    - python
    - qt-main
    - ros-kilted-bond
    - ros-kilted-bondcpp
    - ros-kilted-builtin-interfaces
    - ros-kilted-interactive-markers
    - ros-kilted-lifecycle-msgs
    - ros-kilted-message-filters
    - ros-kilted-nav-msgs
    - ros-kilted-nav2-map-server
    - ros-kilted-pluginlib
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-lifecycle
    - ros-kilted-ros-workspace
    - ros-kilted-rosidl-default-generators
    - ros-kilted-rviz-common
    - ros-kilted-rviz-default-plugins
    - ros-kilted-rviz-ogre-vendor
    - ros-kilted-rviz-rendering
    - ros-kilted-sensor-msgs
    - ros-kilted-std-msgs
    - ros-kilted-std-srvs
    - ros-kilted-tf2
    - ros-kilted-tf2-geometry-msgs
    - ros-kilted-tf2-ros
    - ros-kilted-tf2-sensor-msgs
    - ros-kilted-visualization-msgs
    - ros2-distro-mutex 0.10.* kilted_*
    - suitesparse
    - tbb
    - tbb-devel
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
