# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-ur-robot-driver
  version: 4.0.3
source:
  git: https://github.com/ros2-gbp/Universal_Robots_ROS2_Driver-release.git
  tag: release/kilted/ur_robot_driver/4.0.3-1
  target_directory: ros-kilted-ur-robot-driver/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 10
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - numpy
    - pip
    - python
    - ros-kilted-ament-cmake
    - ros-kilted-ament-cmake-python
    - ros-kilted-backward-ros
    - ros-kilted-controller-manager
    - ros-kilted-controller-manager-msgs
    - ros-kilted-geometry-msgs
    - ros-kilted-hardware-interface
    - ros-kilted-launch-testing-ament-cmake
    - ros-kilted-pluginlib
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-lifecycle
    - ros-kilted-rclpy
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros-kilted-std-msgs
    - ros-kilted-std-srvs
    - ros-kilted-tf2-geometry-msgs
    - ros-kilted-ur-client-library
    - ros-kilted-ur-controllers
    - ros-kilted-ur-dashboard-msgs
    - ros-kilted-ur-description
    - ros-kilted-ur-msgs
    - ros2-distro-mutex 0.10.* kilted_*
  run:
    - python
    - ros-kilted-backward-ros
    - ros-kilted-controller-manager
    - ros-kilted-controller-manager-msgs
    - ros-kilted-force-torque-sensor-broadcaster
    - ros-kilted-geometry-msgs
    - ros-kilted-hardware-interface
    - ros-kilted-joint-state-broadcaster
    - ros-kilted-joint-state-publisher
    - ros-kilted-joint-trajectory-controller
    - ros-kilted-launch
    - ros-kilted-launch-ros
    - ros-kilted-pluginlib
    - ros-kilted-pose-broadcaster
    - ros-kilted-position-controllers
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-lifecycle
    - ros-kilted-rclpy
    - ros-kilted-robot-state-publisher
    - ros-kilted-ros-workspace
    - ros-kilted-ros2-controllers-test-nodes
    - ros-kilted-rviz2
    - ros-kilted-std-msgs
    - ros-kilted-std-srvs
    - ros-kilted-tf2-geometry-msgs
    - ros-kilted-ur-client-library
    - ros-kilted-ur-controllers
    - ros-kilted-ur-dashboard-msgs
    - ros-kilted-ur-description
    - ros-kilted-ur-msgs
    - ros-kilted-urdf
    - ros-kilted-velocity-controllers
    - ros-kilted-xacro
    - ros2-distro-mutex 0.10.* kilted_*
    - socat
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
