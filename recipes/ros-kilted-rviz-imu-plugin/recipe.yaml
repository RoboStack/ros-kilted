# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-rviz-imu-plugin
  version: 2.2.1
source:
  git: https://github.com/ros2-gbp/imu_tools-release.git
  tag: release/kilted/rviz_imu_plugin/2.2.1-1
  target_directory: ros-kilted-rviz-imu-plugin/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 15
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: http://ros.org/wiki/rviz_imu_plugin
  license: BSD-3-Clause
  summary: RVIZ plugin for IMU visualization
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
    - if: build_platform != target_platform
      then:
        - qt-main
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - libgl-devel
    - libopengl-devel
    - numpy
    - pip
    - python
    - qt-main
    - ros-kilted-ament-cmake
    - ros-kilted-message-filters
    - ros-kilted-pluginlib
    - ros-kilted-rclcpp
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros-kilted-rviz-common
    - ros-kilted-rviz-ogre-vendor
    - ros-kilted-rviz-rendering
    - ros-kilted-sensor-msgs
    - ros-kilted-tf2
    - ros-kilted-tf2-ros
    - ros2-distro-mutex 0.13.* kilted_*
  run:
    - libgl-devel
    - libopengl-devel
    - python
    - qt-main
    - ros-kilted-message-filters
    - ros-kilted-pluginlib
    - ros-kilted-rclcpp
    - ros-kilted-ros-workspace
    - ros-kilted-rviz-common
    - ros-kilted-rviz-ogre-vendor
    - ros-kilted-rviz-rendering
    - ros-kilted-sensor-msgs
    - ros-kilted-tf2
    - ros-kilted-tf2-ros
    - ros2-distro-mutex 0.13.* kilted_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
