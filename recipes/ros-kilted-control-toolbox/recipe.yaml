# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-control-toolbox
  version: 5.6.0
source:
  git: https://github.com/ros2-gbp/control_toolbox-release.git
  tag: release/kilted/control_toolbox/5.6.0-1
  target_directory: ros-kilted-control-toolbox/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 12
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - eigen
    - fmt
    - numpy
    - pip
    - python
    - ros-kilted-ament-cmake
    - ros-kilted-ament-cmake-gmock
    - ros-kilted-control-msgs
    - ros-kilted-filters
    - ros-kilted-generate-parameter-library
    - ros-kilted-geometry-msgs
    - ros-kilted-pluginlib
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-lifecycle
    - ros-kilted-rcutils
    - ros-kilted-realtime-tools
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros-kilted-ros2-control-cmake
    - ros-kilted-tf2
    - ros-kilted-tf2-geometry-msgs
    - ros-kilted-tf2-ros
    - ros2-distro-mutex 0.11.* kilted_*
  run:
    - eigen
    - python
    - ros-kilted-control-msgs
    - ros-kilted-filters
    - ros-kilted-generate-parameter-library
    - ros-kilted-geometry-msgs
    - ros-kilted-pluginlib
    - ros-kilted-rclcpp
    - ros-kilted-rcutils
    - ros-kilted-realtime-tools
    - ros-kilted-ros-workspace
    - ros-kilted-tf2
    - ros-kilted-tf2-geometry-msgs
    - ros-kilted-tf2-ros
    - ros2-distro-mutex 0.11.* kilted_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
tests:
  - script:
      - cmake-package-check control_toolbox --targets control_toolbox::control_toolbox control_toolbox::rate_limiter control_toolbox::low_pass_filter
    requirements:
      run:
        - cmake-package-check
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
