# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-opennav-docking
  version: 1.4.2
source:
  git: https://github.com/ros2-gbp/navigation2-release.git
  tag: release/kilted/opennav_docking/1.4.2-1
  target_directory: ros-kilted-opennav-docking/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 15
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  license: Apache-2.0
  summary: A Task Server for robot charger docking
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - numpy
    - pip
    - python
    - ros-kilted-ament-cmake
    - ros-kilted-ament-cmake-gtest
    - ros-kilted-ament-cmake-pytest
    - ros-kilted-ament-index-cpp
    - ros-kilted-ament-lint-auto
    - ros-kilted-ament-lint-common
    - ros-kilted-angles
    - ros-kilted-geometry-msgs
    - ros-kilted-nav-msgs
    - ros-kilted-nav2-common
    - ros-kilted-nav2-graceful-controller
    - ros-kilted-nav2-msgs
    - ros-kilted-nav2-util
    - ros-kilted-opennav-docking-core
    - ros-kilted-pluginlib
    - ros-kilted-rcl-interfaces
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-action
    - ros-kilted-rclcpp-components
    - ros-kilted-rclcpp-lifecycle
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros-kilted-sensor-msgs
    - ros-kilted-tf2
    - ros-kilted-tf2-geometry-msgs
    - ros-kilted-tf2-ros
    - ros-kilted-yaml-cpp-vendor
    - ros2-distro-mutex 0.13.* kilted_*
  run:
    - python
    - ros-kilted-angles
    - ros-kilted-geometry-msgs
    - ros-kilted-nav-msgs
    - ros-kilted-nav2-graceful-controller
    - ros-kilted-nav2-msgs
    - ros-kilted-nav2-util
    - ros-kilted-opennav-docking-core
    - ros-kilted-pluginlib
    - ros-kilted-rcl-interfaces
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-action
    - ros-kilted-rclcpp-components
    - ros-kilted-rclcpp-lifecycle
    - ros-kilted-ros-workspace
    - ros-kilted-sensor-msgs
    - ros-kilted-tf2
    - ros-kilted-tf2-geometry-msgs
    - ros-kilted-tf2-ros
    - ros-kilted-yaml-cpp-vendor
    - ros2-distro-mutex 0.13.* kilted_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
