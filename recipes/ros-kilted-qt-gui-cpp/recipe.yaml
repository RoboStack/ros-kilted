# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-qt-gui-cpp
  version: 2.9.2
source:
  git: https://github.com/ros2-gbp/qt_gui_core-release.git
  tag: release/kilted/qt_gui_cpp/2.9.2-1
  target_directory: ros-kilted-qt-gui-cpp/src/work
  patches:
    - patch/ros-kilted-qt-gui-cpp.patch

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 15
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: http://ros.org/wiki/qt_gui_cpp
  repository: https://github.com/ros-visualization/qt_gui_core
  license: BSD-3-Clause
  summary: qt_gui_cpp provides the foundation for C++-bindings for qt_gui and creates bindings for every generator available. At least one specific binding must be available in order to use C++-plugins.
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
    - ${{ 'pyqt' if (build_platform != target_platform) }}
    - ${{ 'qt-main' if (build_platform != target_platform) }}
    - if: build_platform != target_platform
      then:
        - qt-main
    - if: build_platform != target_platform
      then:
        - pyqt-builder
  host:
    - ${{ 'libgl-devel' if linux }}
    - ${{ 'libopengl-devel' if linux }}
    - if: build_platform == target_platform
      then:
        - pkg-config
    - libgl-devel
    - libopengl-devel
    - numpy
    - pep517
    - pip
    - pkg-config
    - pyside2
    - python
    - qt-main
    - ros-kilted-ament-cmake
    - ros-kilted-ament-cmake-pytest
    - ros-kilted-ament-lint-auto
    - ros-kilted-ament-lint-common
    - ros-kilted-pluginlib
    - ros-kilted-python-qt-binding
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros-kilted-tinyxml2-vendor
    - ros2-distro-mutex 0.13.* kilted_*
    - if: build_platform == target_platform
      then:
        - pyqt-builder
  run:
    - pep517
    - pyqt-builder
    - python
    - ros-kilted-pluginlib
    - ros-kilted-qt-gui
    - ros-kilted-ros-workspace
    - ros-kilted-tinyxml2-vendor
    - ros2-distro-mutex 0.13.* kilted_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
