# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-hpp-fcl
  version: 3.0.2

build:
  number: 15
  script: ''
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://github.com/humanoid-path-planner/hpp-fcl
  license: BSD-3-Clause
  summary: An extension of the Flexible Collision Library.
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - git
    - if: build_platform != target_platform
      then:
        - doxygen
  host:
    - assimp
    - eigen
    - graphviz
    - libboost-devel
    - libboost-python-devel
    - lxml
    - numpy
    - python
    - ros-kilted-eigenpy
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros2-distro-mutex 0.13.* kilted_*
    - if: build_platform == target_platform
      then:
        - git
    - if: build_platform == target_platform
      then:
        - doxygen
  run:
    - assimp
    - eigen
    - hpp-fcl >=3.0.2, <3.0.3a0
    - libboost-devel
    - libboost-python-devel
    - numpy
    - python
    - ros-kilted-eigenpy
    - ros-kilted-ros-workspace
    - ros2-distro-mutex 0.13.* kilted_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
