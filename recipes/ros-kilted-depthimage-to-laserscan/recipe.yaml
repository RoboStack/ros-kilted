# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-depthimage-to-laserscan
  version: 2.5.1
source:
  git: https://github.com/ros2-gbp/depthimage_to_laserscan-release.git
  tag: release/kilted/depthimage_to_laserscan/2.5.1-3
  target_directory: ros-kilted-depthimage-to-laserscan/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 15
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: http://ros.org/wiki/depthimage_to_laserscan
  repository: https://github.com/ros-perception/depthimage_to_laserscan
  license: BSD-3-Clause
  summary: depthimage_to_laserscan
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - libgl-devel
    - libopencv
    - libopengl-devel
    - numpy
    - pip
    - py-opencv
    - python
    - ros-kilted-ament-cmake-gtest
    - ros-kilted-ament-cmake-ros
    - ros-kilted-ament-lint-auto
    - ros-kilted-ament-lint-common
    - ros-kilted-image-geometry
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-components
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros-kilted-sensor-msgs
    - ros2-distro-mutex 0.13.* kilted_*
  run:
    - libgl-devel
    - libopencv
    - libopengl-devel
    - py-opencv
    - python
    - ros-kilted-image-geometry
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-components
    - ros-kilted-ros-workspace
    - ros-kilted-sensor-msgs
    - ros2-distro-mutex 0.13.* kilted_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
