# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros2-distro-mutex
  version: 0.13.0

build:
  number: 15
  string: kilted_15
  script: ''
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://github.com/robostack/ros-kilted
  license: BSD-3-Clause
  summary: "The ROS2 distro mutex. To switch between ROS2 versions, you need to change the mutex.\nE.g. mamba install ros2-distro-mutex=*=kilted to switch to kilted."
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  run_constraints:
    - libboost 1.88.*
    - libboost-devel 1.88.*
    - pcl 1.15.1.*
    - gazebo 11.*
    - libprotobuf 6.31.1.*
    - vtk 9.5.2.*
  run_exports:
    weak:
      - ${{ pin_subpackage('ros2-distro-mutex', upper_bound='x.x') }}
