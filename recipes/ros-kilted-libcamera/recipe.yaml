# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-libcamera
  version: 0.5.0

build:
  number: 15
  script: ''
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://libcamera.org
  license: LGPL-2.1-or-later
  summary: An open source camera stack and framework for Linux, Android, and ChromeOS
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - git
    - if: build_platform != target_platform
      then:
        - pybind11
  host:
    - jinja2
    - libudev
    - libusb
    - openssl
    - pkg-config
    - pybind11
    - python
    - pyyaml
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros2-distro-mutex 0.13.* kilted_*
    - yaml
    - yaml-cpp
  run:
    - libcamera >=0.5.0, <0.6.0a0
    - libudev
    - libusb
    - openssl
    - python
    - ros-kilted-ros-workspace
    - ros2-distro-mutex 0.13.* kilted_*
    - yaml
    - yaml-cpp
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
