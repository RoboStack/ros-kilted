# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-joint-limits
  version: 5.11.3
source:
  git: https://github.com/ros2-gbp/ros2_control-release.git
  tag: release/kilted/joint_limits/5.11.3-1
  target_directory: ros-kilted-joint-limits/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 15
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://github.com/ros-controls/ros2_control/wiki
  repository: https://github.com/ros-controls/ros2_control
  license: Apache-2.0
  summary: Package with interfaces for handling of joint limits in controllers or in hardware. The package also implements Saturation Joint Limiter for position-velocity-acceleration set and other individual interfaces.
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - fmt
    - numpy
    - pip
    - python
    - ros-kilted-ament-cmake
    - ros-kilted-ament-cmake-gen-version-h
    - ros-kilted-ament-cmake-gmock
    - ros-kilted-backward-ros
    - ros-kilted-generate-parameter-library
    - ros-kilted-launch-ros
    - ros-kilted-launch-testing-ament-cmake
    - ros-kilted-pluginlib
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-lifecycle
    - ros-kilted-realtime-tools
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros-kilted-ros2-control-cmake
    - ros-kilted-trajectory-msgs
    - ros-kilted-urdf
    - ros2-distro-mutex 0.13.* kilted_*
  run:
    - fmt
    - python
    - ros-kilted-backward-ros
    - ros-kilted-pluginlib
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-lifecycle
    - ros-kilted-realtime-tools
    - ros-kilted-ros-workspace
    - ros-kilted-trajectory-msgs
    - ros-kilted-urdf
    - ros2-distro-mutex 0.13.* kilted_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
