# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-image-view
  version: 6.0.11
source:
  git: https://github.com/ros2-gbp/image_pipeline-release.git
  tag: release/kilted/image_view/6.0.11-1
  target_directory: ros-kilted-image-view/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 15
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://index.ros.org/p/image_view/github-ros-perception-image_pipeline/
  repository: https://github.com/ros-perception/image_pipeline
  license: BSD-3-Clause
  summary: A simple viewer for ROS image topics. Includes a specialized viewer for stereo + disparity images.
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - ${{ 'libgl-devel' if linux }}
    - ${{ 'libopengl-devel' if linux }}
    - if: build_platform == target_platform
      then:
        - pkg-config
    - numpy
    - pip
    - python
    - ros-kilted-ament-cmake-auto
    - ros-kilted-ament-lint-auto
    - ros-kilted-ament-lint-common
    - ros-kilted-camera-calibration-parsers
    - ros-kilted-cv-bridge
    - ros-kilted-image-transport
    - ros-kilted-message-filters
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-components
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros-kilted-sensor-msgs
    - ros-kilted-std-srvs
    - ros-kilted-stereo-msgs
    - ros2-distro-mutex 0.13.* kilted_*
  run:
    - ${{ 'libopencv * *qt6*' if not (ppc64le or aarch64 or osx) }}
    - python
    - ros-kilted-camera-calibration-parsers
    - ros-kilted-cv-bridge
    - ros-kilted-image-transport
    - ros-kilted-message-filters
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-components
    - ros-kilted-rclpy
    - ros-kilted-ros-workspace
    - ros-kilted-sensor-msgs
    - ros-kilted-std-srvs
    - ros-kilted-stereo-msgs
    - ros2-distro-mutex 0.13.* kilted_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
