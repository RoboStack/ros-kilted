# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-theora-image-transport
  version: 5.1.1
source:
  git: https://github.com/ros2-gbp/image_transport_plugins-release.git
  tag: release/kilted/theora_image_transport/5.1.1-1
  target_directory: ros-kilted-theora-image-transport/src/work
  patches:
    - patch/ros-kilted-theora-image-transport.win.patch

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 15
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: http://www.ros.org/wiki/image_transport_plugins
  license: BSD-3-Clause
  summary: Theora_image_transport provides a plugin to image_transport for transparently sending an image stream encoded with the Theora codec.
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
    - if: target_platform == 'emscripten-wasm32'
      then:
        - ros-kilted-rosidl-default-generators
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - libogg
    - libopencv
    - libtheora
    - numpy
    - pip
    - pkg-config
    - py-opencv
    - python
    - ros-kilted-ament-cmake
    - ros-kilted-ament-lint-auto
    - ros-kilted-ament-lint-common
    - ros-kilted-cv-bridge
    - ros-kilted-image-transport
    - ros-kilted-pluginlib
    - ros-kilted-rclcpp
    - ros-kilted-rcutils
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros-kilted-rosidl-default-generators
    - ros-kilted-sensor-msgs
    - ros-kilted-std-msgs
    - ros2-distro-mutex 0.13.* kilted_*
  run:
    - libogg
    - libopencv
    - libtheora
    - py-opencv
    - python
    - ros-kilted-cv-bridge
    - ros-kilted-image-transport
    - ros-kilted-pluginlib
    - ros-kilted-rclcpp
    - ros-kilted-rcutils
    - ros-kilted-ros-workspace
    - ros-kilted-rosidl-default-runtime
    - ros-kilted-sensor-msgs
    - ros-kilted-std-msgs
    - ros2-distro-mutex 0.13.* kilted_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
