# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-moveit-hybrid-planning
  version: 2.14.0
source:
  git: https://github.com/ros2-gbp/moveit2-release.git
  tag: release/kilted/moveit_hybrid_planning/2.14.0-1
  target_directory: ros-kilted-moveit-hybrid-planning/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 12
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - numpy
    - pip
    - python
    - ros-kilted-ament-cmake
    - ros-kilted-ament-cmake-gtest
    - ros-kilted-ament-index-cpp
    - ros-kilted-controller-manager
    - ros-kilted-moveit-common
    - ros-kilted-moveit-configs-utils
    - ros-kilted-moveit-core
    - ros-kilted-moveit-msgs
    - ros-kilted-moveit-planners-ompl
    - ros-kilted-moveit-resources-panda-moveit-config
    - ros-kilted-moveit-ros-planning
    - ros-kilted-moveit-ros-planning-interface
    - ros-kilted-moveit-simple-controller-manager
    - ros-kilted-pluginlib
    - ros-kilted-position-controllers
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-action
    - ros-kilted-rclcpp-components
    - ros-kilted-robot-state-publisher
    - ros-kilted-ros-environment
    - ros-kilted-ros-testing
    - ros-kilted-ros-workspace
    - ros-kilted-std-msgs
    - ros-kilted-std-srvs
    - ros-kilted-tf2-ros
    - ros-kilted-trajectory-msgs
    - ros2-distro-mutex 0.11.* kilted_*
  run:
    - python
    - ros-kilted-ament-index-cpp
    - ros-kilted-controller-manager
    - ros-kilted-moveit-common
    - ros-kilted-moveit-core
    - ros-kilted-moveit-msgs
    - ros-kilted-moveit-resources-panda-moveit-config
    - ros-kilted-moveit-ros-planning
    - ros-kilted-moveit-ros-planning-interface
    - ros-kilted-pluginlib
    - ros-kilted-position-controllers
    - ros-kilted-rclcpp
    - ros-kilted-rclcpp-action
    - ros-kilted-rclcpp-components
    - ros-kilted-robot-state-publisher
    - ros-kilted-ros-workspace
    - ros-kilted-rviz2
    - ros-kilted-std-msgs
    - ros-kilted-std-srvs
    - ros-kilted-tf2-ros
    - ros-kilted-trajectory-msgs
    - ros2-distro-mutex 0.11.* kilted_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
