# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-gz-math-vendor
  version: 0.2.5
source:
  git: https://github.com/ros2-gbp/gz_math_vendor-release.git
  tag: release/kilted/gz_math_vendor/0.2.5-1
  target_directory: ros-kilted-gz-math-vendor/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 15
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://github.com/gazebosim/gz-math
  license: Apache-2.0
  summary: 'Vendor package for: gz-math8 8.2.1 Gazebo Math : Math classes and functions for robot applications'
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
    - if: build_platform != target_platform
      then:
        - pybind11
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - eigen
    - gz-math8
    - numpy
    - pip
    - pybind11
    - pytest
    - python
    - ros-kilted-ament-cmake-copyright
    - ros-kilted-ament-cmake-core
    - ros-kilted-ament-cmake-lint-cmake
    - ros-kilted-ament-cmake-test
    - ros-kilted-ament-cmake-vendor-package
    - ros-kilted-ament-cmake-xmllint
    - ros-kilted-gz-cmake-vendor
    - ros-kilted-gz-utils-vendor
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros2-distro-mutex 0.13.* kilted_*
  run:
    - eigen
    - gz-math8
    - python
    - ros-kilted-gz-cmake-vendor
    - ros-kilted-gz-utils-vendor
    - ros-kilted-ros-workspace
    - ros2-distro-mutex 0.13.* kilted_*
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
